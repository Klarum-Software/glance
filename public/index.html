<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>klarum glance</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">klarum glance</span>
      <span class="brand-time" id="clock">—</span>
    </div>

    <div class="services" id="services" title="systemd-user service status">
      <span class="svc" data-svc="orch"><i></i>orch</span>
      <span class="svc" data-svc="inbox"><i></i>inbox</span>
      <span class="svc" data-svc="tmux"><i></i>tmux</span>
    </div>

    <div class="actions">
      <button class="btn btn-claude" data-action="launch-claude" title="Launch new claude session in ~/repos/noah-tools">
        <span class="btn-claude-icon">▸</span>claude
      </button>
      <button class="btn" data-action="refresh">Refresh</button>
      <button class="btn" data-action="sync-linear">Sync Linear</button>
      <a class="btn btn-link" href="http://127.0.0.1:5174" target="_blank" rel="noopener">Inbox UI</a>
    </div>
  </header>

  <main class="grid" id="grid">
    <section class="col col-remote" data-col="remote">
      <h2>
        <span class="col-tag remote">REMOTE</span>
        <span class="col-meta" id="remote-meta"></span>
        <button class="col-action" id="remote-add" title="add a peer">+</button>
      </h2>
      <form class="peer-add-form" id="peer-add-form" hidden>
        <input type="text" name="name" placeholder="name" autocomplete="off" required>
        <input type="text" name="host" placeholder="host or IP" autocomplete="off" required>
        <input type="number" name="port" placeholder="port" min="1" max="65535" autocomplete="off">
        <div class="peer-add-buttons">
          <button type="submit" class="btn btn-sm">add</button>
          <button type="button" class="btn btn-sm" id="peer-add-cancel">cancel</button>
        </div>
        <div class="peer-add-error" id="peer-add-error"></div>
      </form>
      <div class="remote-grid" id="remote-grid">
        <div class="remote-empty">
          <div class="remote-empty-title">no peers configured</div>
          <div class="remote-empty-hint">
            Install <code>klarum-presence</code> on each machine in the tailnet.
            <br>Peers will be auto-discovered via <code>tailscale status --json</code>,
            or add a peer manually with the <code>+</code> button above.
          </div>
        </div>
      </div>
    </section>

    <div class="col-gutter" data-gutter-after="remote"></div>

    <section class="col col-sessions" data-col="sessions">
      <h2><span class="col-tag sessions">SESSIONS</span><span class="col-meta" id="sessions-meta"></span></h2>
      <div class="sessions-body">
        <div class="ram-bar" id="ram-bar" title="system RAM">
          <div class="ram-bar-segs" id="ram-bar-segs"></div>
        </div>
        <div class="sessions-list" id="sessions-list"></div>
      </div>
    </section>

    <div class="col-gutter" data-gutter-after="sessions"></div>

    <section class="col" data-col="linear">
      <h2><span class="col-tag linear">LINEAR</span><span class="col-meta" id="linear-meta"></span></h2>
      <ul class="list" id="linear-list"></ul>
    </section>

    <div class="col-gutter" data-gutter-after="linear"></div>

    <section class="col" data-col="calendar">
      <h2><span class="col-tag calendar">CALENDAR</span><span class="col-meta" id="calendar-meta"></span></h2>
      <ul class="list" id="calendar-list"></ul>
    </section>

    <div class="col-gutter" data-gutter-after="calendar"></div>

    <section class="col" data-col="inbox">
      <h2>
        <span class="col-tag inbox">INBOX</span>
        <span class="col-meta" id="inbox-meta"></span>
        <button class="col-action" id="inbox-compose" title="compose new email">+</button>
      </h2>
      <ul class="list" id="inbox-list"></ul>
    </section>
  </main>

  <div class="modal" id="compose-modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="compose-title">
      <h3 id="compose-title">New message</h3>
      <form id="compose-form">
        <label>To <input type="text" name="to" required autocomplete="off"></label>
        <label>Cc <input type="text" name="cc" autocomplete="off"></label>
        <label>Bcc <input type="text" name="bcc" autocomplete="off"></label>
        <label>Subject <input type="text" name="subject" required autocomplete="off"></label>
        <label class="compose-body">Body <textarea name="body" rows="10"></textarea></label>
        <input type="hidden" name="reply_to_id">
        <div class="compose-error" id="compose-error" hidden></div>
        <div class="compose-buttons">
          <button type="submit" class="btn">Send</button>
          <button type="button" class="btn" id="compose-cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
